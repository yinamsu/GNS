name = "gns"
main = "src/index.py"
compatibility_date = "2024-05-01"
compatibility_flags = ["python_workers"]

# 1분마다 실행되는 스케줄러 설정
[triggers]
crons = ["* * * * *"]

# 데이터 저장소(KV) 바인딩
[[kv_namespaces]]
binding = "NEWS_KV"
id = "1700ec2f6e1b4fd2aeafca587d2156ee"

# 변수 설정(vars)을 여기서 삭제하여, 클라우드플레어 대시보드의 Secrets 설정을 우선하도록 합니다.
